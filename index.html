<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=devise-width,initial-scale=1.0">
        <title>connexion-Eglise</title>
        <link rel="stylesheet" href="css/styles.css">
        <script src="js/seConnecter.js"></script>
    </head>
    <body>
         <section>
                <div class="loginPrincipal">
                    <div class="login-box">

                    <!-- Logo intégré -->
                    <img src="imag.png" alt="Logo AEBM" class="logo">

                    <h2>A.E.B.M</h2>
                    <h3>connexion</h3>
                    <form id="formulairePrincipale">
                        <div class="input-box">
                          <input type="text" id="identifiant" name="identifiant" placeholder="identifiant" required>
                          <input type="password" id="motDePasse" name="motDePasse" placeholder="Mot de Passe" required>    
                        </div>
                        <div class="remenber-forgot">
                          <label>
                            <input type="checkbox"> Se souvenir de moi
                          </label>
                          <a href="#">Mot de passe oublié ?</a>
                        </div>
                          <button type="submit">Se connecter</button>
                    </form>
                      <p class="footer-text">ASSEMBLÉE ÉTOILE BRILLANTE DU MATIN</p>
                      <p id="notificationsConnexion"></p>
                </div>        
        </section>       
    </body>
</html>
