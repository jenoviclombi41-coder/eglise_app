<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=devise-width,initial-scale=1.0">
  <title>formation - eglise</title>
  <link rel="stylesheet" href="../css/styles2.css">
  <script src="../js/formation.js" defer></script>
  <script src="../js/menu.js" defer></script>
  <script src="../js/button.js"></script>
</head>

<body>
  <div class="container">
    <div class="header">
      <button class="menu-button" onclick="toggleMenu()">≡</button>
      <div class="logo"></div>
      <div class="search_bar">
        <input type="text" placeholder="rechercher">
      </div>
    </div>
    <div id="menu" class="menu">
      <div class="logo">logo</div>
      <nav>
        <ul id="menuAdministrateur">
          <li><a href="#">chargement</a></li>
        </ul>
      </nav>
    </div>

  </div>
  <div class="content">
    <h1>Enregistrer une formation</h1>
    <form id="formulaireEnregistrerformation">
      <div class="form-group">
        <label for="nom">Nom de la formation:</label>
        <input type="text" id="nom" name="nom" required placeholder="entrer nom de la formation">
      </div>
      <div class="form-group">
        <label for="duree">Duree de la formation:</label>
        <input type="number" id="duree" name="duree" required placeholder="EX: 40" min="1">
      </div>
      <div class="form-group">
        <label for="cout">Cout en franc congolais:</label>
        <input type="number" id="cout" name="cout" required placeholder="EX: 5000" min="0">
      </div>
      <div class="form-group">
        <button type="submit">Enregistrer la formation</button>
      </div>
    </form>
    <span id="notificationEnregistrerFormation"></span>
    <div class="form-group" style="margin-top: 20px;">
      <a href="listerformations.html?identifiant=" id="lienLister"
        style="padding: 10px 20px; background-color: #080808; color: rgb(241, 187, 7); text-decoration: none; border-radius: 4px; display: inline-block;">Voir
        les formations enregistrées</a>
    </div>
  </div>
</body>

</html>
